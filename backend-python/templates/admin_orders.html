{% extends 'base.html' %}
{% block title %}Manage Orders - Admin{% endblock %}
{% block content %}
<div class="container">
    <div class="section-heading">
        <h2>Manage Orders</h2>
        <p>View and manage customer orders</p>
    </div>
    
    <div style="margin-bottom: 1.5rem;">
        <input 
            type="text" 
            id="searchBox" 
            class="form-control" 
            placeholder="Search by order number, customer name, phone..." 
            onkeyup="searchOrders()"
            style="max-width: 500px;"
        >
    </div>
    
    <div id="orders-list"></div>
    
    <!-- Order Details Modal -->
    <div id="order-details-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="closeOrderModal()">&times;</span>
            <h3>Order Details</h3>
            <div id="order-details-content"></div>
        </div>
    </div>
</div>

<style>
.btn-sm {
    padding: 0.4rem 0.8rem;
    font-size: 0.9rem;
}
.badge {
    padding: 0.25rem 0.5rem;
    border-radius: 4px;
    font-size: 0.85rem;
    font-weight: 600;
}
.badge-warning {
    background: #FF9800;
    color: white;
}
.badge-info {
    background: #2196F3;
    color: white;
}
.badge-success {
    background: #4CAF50;
    color: white;
}
.badge-danger {
    background: #f44336;
    color: white;
}
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    overflow: auto;
    background-color: rgba(0,0,0,0.4);
}
.modal-content {
    background-color: #fefefe;
    margin: 5% auto;
    padding: 2rem;
    border: 1px solid #888;
    border-radius: 8px;
    width: 80%;
    max-width: 600px;
}
.close {
    color: #aaa;
    float: right;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
}
.close:hover {
    color: black;
}
.comment-section {
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 2px solid #ddd;
}
.customer-comment {
    background: #f8f9fa;
    padding: 1rem;
    border-radius: 8px;
    margin-bottom: 1rem;
}
.stars-display {
    color: #FFD700;
    font-size: 1.2rem;
    margin: 0.5rem 0;
}
.reply-form {
    margin-top: 1rem;
}
.reply-textarea {
    width: 100%;
    padding: 0.8rem;
    border: 1px solid #ddd;
    border-radius: 6px;
    resize: vertical;
    min-height: 60px;
    font-family: inherit;
}
.btn-reply {
    margin-top: 0.5rem;
    padding: 0.6rem 1.2rem;
    background: #2196F3;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
}
.btn-reply:hover {
    background: #1976D2;
}
.admin-reply-display {
    background: #e3f2fd;
    padding: 0.8rem;
    border-radius: 6px;
    margin-top: 0.8rem;
    border-left: 3px solid #2196F3;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', () => {
    loadAdminOrders();
});

function searchOrders() {
    const query = document.getElementById('searchBox').value.toLowerCase();
    const rows = document.querySelectorAll('#orders-list tbody tr');
    
    rows.forEach(row => {
        const text = row.textContent.toLowerCase();
        row.style.display = text.includes(query) ? '' : 'none';
    });
}

async function loadAdminOrders() {
    const token = localStorage.getItem('token');
    try {
        const response = await fetch('/api/admin/recent-orders', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        const container = document.getElementById('orders-list');
        if (data.success && data.orders.length > 0) {
            container.innerHTML = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>Order #</th>
                            <th>Customer</th>
                            <th>Date & Time</th>
                            <th>Items</th>
                            <th>Total</th>
                            <th>Payment</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.orders.map(order => {
                            const items = typeof order.items === 'string' ? JSON.parse(order.items) : order.items;
                            const pricing = typeof order.pricing === 'string' ? JSON.parse(order.pricing) : order.pricing;
                            const payment = typeof order.payment === 'string' ? JSON.parse(order.payment) : order.payment;
                            const orderDate = new Date(order.createdAt);
                            
                            const statusColors = {
                                'pending': 'warning',
                                'confirmed': 'info',
                                'preparing': 'info',
                                'completed': 'success',
                                'cancelled': 'danger'
                            };
                            
                            return `
                                <tr>
                                    <td><strong>#${order.orderNumber}</strong></td>
                                    <td>${order.userName || 'Customer'}</td>
                                    <td>${orderDate.toLocaleString('en-IN', { dateStyle: 'short', timeStyle: 'short' })}</td>
                                    <td>${items.length} item(s)</td>
                                    <td>₹${pricing.total}</td>
                                    <td>${payment.method === 'cod' ? 'COD' : 'Online'}</td>
                                    <td><span class="badge badge-${statusColors[order.status] || 'secondary'}">${order.status}</span></td>
                                    <td>
                                        <button class="btn btn-primary btn-sm" onclick="viewOrderDetails(${order.id})">View</button>
                                        ${order.status === 'pending' ? `
                                            <button class="btn btn-success btn-sm" onclick="updateOrderStatus(${order.id}, 'confirmed')">Confirm</button>
                                        ` : ''}
                                        ${order.status === 'confirmed' ? `
                                            <button class="btn btn-success btn-sm" onclick="updateOrderStatus(${order.id}, 'completed')">Complete</button>
                                        ` : ''}
                                    </td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
        } else {
            container.innerHTML = '<p>No orders yet.</p>';
        }
    } catch (error) {
        showAlert('Failed to load orders', 'error');
    }
}

async function viewOrderDetails(orderId) {
    const token = localStorage.getItem('token');
    try {
        const response = await fetch(`/api/orders/${orderId}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        if (data.success) {
            const order = data.order;
            const items = typeof order.items === 'string' ? JSON.parse(order.items) : order.items;
            const pricing = typeof order.pricing === 'string' ? JSON.parse(order.pricing) : order.pricing;
            const payment = typeof order.payment === 'string' ? JSON.parse(order.payment) : order.payment;
            const orderDate = new Date(order.createdAt);
            
            const modalContent = `
                <div class="order-detail-section">
                    <h4>Order #${order.orderNumber}</h4>
                    <p><strong>Placed:</strong> ${orderDate.toLocaleString('en-IN')}</p>
                    <p><strong>Status:</strong> ${order.status}</p>
                    <p><strong>Order Type:</strong> ${order.orderType}</p>
                    ${order.deliveryAddress ? `<p><strong>Delivery Address:</strong> ${order.deliveryAddress}</p>` : ''}
                    ${order.deliveryLatitude && order.deliveryLongitude ? `
                        <p>
                            <strong>Delivery Location:</strong> 
                            <span style="color: #666; font-size: 0.9rem;">${order.deliveryLatitude}, ${order.deliveryLongitude}</span>
                            <a href="https://www.google.com/maps?q=${order.deliveryLatitude},${order.deliveryLongitude}" 
                               target="_blank" 
                               class="btn btn-sm btn-success" 
                               style="margin-left: 1rem; padding: 0.3rem 0.8rem; text-decoration: none; display: inline-block;">
                                📍 View on Map
                            </a>
                        </p>
                    ` : ''}
                    ${order.specialInstructions ? `<p><strong>Instructions:</strong> ${order.specialInstructions}</p>` : ''}
                    
                    <h4 style="margin-top: 1.5rem;">Items</h4>
                    <table style="width: 100%; margin-bottom: 1rem;">
                        ${items.map(item => `
                            <tr>
                                <td>${item.name} x ${item.quantity}</td>
                                <td style="text-align: right;">₹${item.price * item.quantity}</td>
                            </tr>
                        `).join('')}
                    </table>
                    
                    <h4>Pricing</h4>
                    <table style="width: 100%;">
                        <tr>
                            <td>Subtotal:</td>
                            <td style="text-align: right;">₹${pricing.subtotal}</td>
                        </tr>
                        ${pricing.deliveryCharges ? `
                            <tr>
                                <td>Delivery:</td>
                                <td style="text-align: right;">₹${pricing.deliveryCharges}</td>
                            </tr>
                        ` : ''}
                        ${pricing.parcelCharge ? `
                            <tr>
                                <td>Packing:</td>
                                <td style="text-align: right;">₹${pricing.parcelCharge}</td>
                            </tr>
                        ` : ''}
                        ${pricing.discount ? `
                            <tr style="color: green;">
                                <td>Discount:</td>
                                <td style="text-align: right;">-₹${pricing.discount}</td>
                            </tr>
                        ` : ''}
                        <tr style="font-weight: bold; font-size: 1.1rem;">
                            <td>Total:</td>
                            <td style="text-align: right;">₹${pricing.total}</td>
                        </tr>
                    </table>
                    
                    <h4 style="margin-top: 1.5rem;">Payment</h4>
                    <p><strong>Method:</strong> ${payment.method === 'cod' ? 'Cash on Delivery' : 'Online Payment'}</p>
                    <p><strong>Status:</strong> ${payment.status}</p>
                    ${payment.transactionId ? `
                        <p><strong>Transaction ID:</strong> <code style="background: #f0f0f0; padding: 0.2rem 0.5rem; border-radius: 3px; font-size: 0.9rem;">${payment.transactionId}</code></p>
                    ` : ''}
                    ${payment.orderId ? `
                        <p><strong>Payment Order ID:</strong> <code style="background: #f0f0f0; padding: 0.2rem 0.5rem; border-radius: 3px; font-size: 0.9rem;">${payment.orderId}</code></p>
                    ` : ''}
                    
                    ${order.status !== 'cancelled' && order.status !== 'completed' ? `
                        <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 2px solid #ddd;">
                            <h4>Order Actions</h4>
                            ${payment.status === 'paid' && payment.transactionId ? `
                                <button class="btn btn-danger" onclick="cancelAndRefundOrder(${order.id}, '${payment.transactionId}', ${pricing.total})">
                                    Cancel Order & Process Refund
                                </button>
                                <p style="font-size: 0.85rem; color: #999; margin-top: 0.5rem;">
                                    Payment ID: ${payment.transactionId} | Amount: ₹${pricing.total}
                                </p>
                            ` : order.status === 'pending' ? `
                                <button class="btn btn-danger" onclick="cancelOrder(${order.id})">
                                    Cancel Order
                                </button>
                                <p style="font-size: 0.85rem; color: #999; margin-top: 0.5rem;">
                                    ${payment.method === 'cod' ? 'No payment to refund (COD)' : 'Payment not completed yet'}
                                </p>
                            ` : ''}
                        </div>
                    ` : ''}
                    
                    <div class="comment-section" id="comment-section-${order.id}">
                        <h4>Customer Feedback</h4>
                        <div id="comments-container-${order.id}">
                            <p style="color: #999;">Loading comments...</p>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('order-details-content').innerHTML = modalContent;
            document.getElementById('order-details-modal').style.display = 'block';
            
            // Load comments for this order
            loadOrderComments(order.id);
        } else {
            showAlert(data.message, 'error');
        }
    } catch (error) {
        showAlert('Failed to load order details', 'error');
    }
}

function closeOrderModal() {
    document.getElementById('order-details-modal').style.display = 'none';
}

async function updateOrderStatus(orderId, newStatus) {
    const token = localStorage.getItem('token');
    if (!confirm(`Are you sure you want to ${newStatus} this order?`)) {
        return;
    }
    try {
        const response = await fetch(`/api/orders/${orderId}/status`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ status: newStatus })
        });
        const data = await response.json();
        if (data.success) {
            showAlert(`Order ${newStatus} successfully!`, 'success');
            loadAdminOrders();
        } else {
            showAlert(data.message, 'error');
        }
    } catch (error) {
        showAlert('Failed to update order status', 'error');
    }
}

async function loadOrderComments(orderId) {
    const token = localStorage.getItem('token');
    try {
        const response = await fetch(`/api/orders/${orderId}/comments`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        const container = document.getElementById(`comments-container-${orderId}`);
        
        if (data.success && data.comments && data.comments.length > 0) {
            const comment = data.comments[0];
            const hasReply = comment.adminReply;
            
            container.innerHTML = `
                <div class="customer-comment">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <strong>Customer Rating & Review</strong>
                        <small style="color: #999;">${new Date(comment.createdAt).toLocaleDateString('en-IN')}</small>
                    </div>
                    <div class="stars-display">
                        ${'★'.repeat(comment.rating)}${'☆'.repeat(5 - comment.rating)}
                    </div>
                    <p style="margin: 0.5rem 0; color: #333;">"${comment.comment}"</p>
                    
                    ${hasReply ? `
                        <div class="admin-reply-display">
                            <strong style="color: #1976D2;">Your Reply:</strong>
                            <p style="margin: 0.5rem 0 0 0;">${comment.adminReply}</p>
                            <small style="color: #666;">${new Date(comment.repliedAt).toLocaleDateString('en-IN')}</small>
                        </div>
                        <button class="btn btn-sm" onclick="editReply(${comment.id}, '${comment.adminReply.replace(/'/g, "\\'")}', ${orderId})" style="margin-top: 0.5rem;">
                            Edit Reply
                        </button>
                    ` : `
                        <div class="reply-form">
                            <textarea 
                                id="reply-text-${comment.id}" 
                                class="reply-textarea" 
                                placeholder="Write your reply to the customer..."
                            ></textarea>
                            <button class="btn-reply" onclick="submitReply(${comment.id}, ${orderId})">
                                Send Reply
                            </button>
                        </div>
                    `}
                </div>
            `;
        } else {
            container.innerHTML = `
                <p style="color: #999; font-style: italic;">No customer feedback yet for this order.</p>
            `;
        }
    } catch (error) {
        console.error('Failed to load comments:', error);
        document.getElementById(`comments-container-${orderId}`).innerHTML = `
            <p style="color: #f44336;">Failed to load comments</p>
        `;
    }
}

function editReply(commentId, currentReply, orderId) {
    const container = document.getElementById(`comments-container-${orderId}`);
    const commentDiv = container.querySelector('.customer-comment');
    const replySection = commentDiv.querySelector('.admin-reply-display').parentElement;
    
    replySection.innerHTML = `
        <div class="reply-form">
            <textarea 
                id="reply-text-${commentId}" 
                class="reply-textarea"
            >${currentReply}</textarea>
            <button class="btn-reply" onclick="submitReply(${commentId}, ${orderId})">
                Update Reply
            </button>
            <button class="btn btn-sm" onclick="loadOrderComments(${orderId})" style="margin-left: 0.5rem;">
                Cancel
            </button>
        </div>
    `;
}

async function submitReply(commentId, orderId) {
    const replyText = document.getElementById(`reply-text-${commentId}`).value.trim();
    
    if (!replyText) {
        showAlert('Please write a reply', 'error');
        return;
    }
    
    const token = localStorage.getItem('token');
    try {
        const response = await fetch(`/api/orders/comments/${commentId}/reply`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ reply: replyText })
        });
        
        const data = await response.json();
        if (data.success) {
            showAlert('Reply sent successfully!', 'success');
            loadOrderComments(orderId);
        } else {
            showAlert(data.message || 'Failed to send reply', 'error');
        }
    } catch (error) {
        console.error('Failed to submit reply:', error);
        showAlert('Failed to send reply', 'error');
    }
}

async function cancelOrder(orderId) {
    if (!confirm('Are you sure you want to cancel this order?')) {
        return;
    }
    
    const token = localStorage.getItem('token');
    try {
        const response = await fetch(`/api/orders/${orderId}/status`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ status: 'cancelled' })
        });
        
        const data = await response.json();
        if (data.success) {
            showAlert('Order cancelled successfully!', 'success');
            closeOrderModal();
            loadAdminOrders();
        } else {
            showAlert(data.message || 'Failed to cancel order', 'error');
        }
    } catch (error) {
        console.error('Failed to cancel order:', error);
        showAlert('Failed to cancel order', 'error');
    }
}

async function cancelAndRefundOrder(orderId, paymentId, amount) {
    const confirmMessage = `Cancel order and process refund?\n\nPayment ID: ${paymentId}\nRefund Amount: ₹${amount}\n\nThis action cannot be undone.`;
    
    if (!confirm(confirmMessage)) {
        return;
    }
    
    const token = localStorage.getItem('token');
    try {
        // First cancel the order (this will auto-trigger refund on backend)
        const response = await fetch(`/api/orders/${orderId}/status`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ status: 'cancelled' })
        });
        
        const data = await response.json();
        if (data.success) {
            if (data.refundId) {
                showAlert(`Order cancelled and refund processed!\nRefund ID: ${data.refundId}`, 'success');
            } else {
                showAlert('Order cancelled successfully! Refund will be processed.', 'success');
            }
            closeOrderModal();
            loadAdminOrders();
        } else {
            showAlert(data.message || 'Failed to cancel order', 'error');
        }
    } catch (error) {
        console.error('Failed to cancel and refund order:', error);
        showAlert('Failed to cancel and refund order', 'error');
    }
}
</script>
{% endblock %}
