{% extends 'base.html' %}
{% block title %}Manage Events - Admin{% endblock %}
{% block content %}
<div class="container">
    <div class="section-heading">
        <h2>Manage Events</h2>
        <p>Manage packages and customer event requests</p>
    </div>
    
    <!-- Tabs -->
    <div class="tabs" style="margin-bottom: 2rem;">
        <button class="tab-btn active" onclick="switchTab('packages')">Packages</button>
        <button class="tab-btn" onclick="switchTab('requests')">Event Requests</button>
    </div>
    
    <!-- Packages Tab -->
    <div id="packages-tab" class="tab-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h3>Event Packages</h3>
            <button class="btn btn-primary" onclick="showAddEventForm()">+ Add New Package</button>
        </div>
    
    <div id="event-form" style="display: none;" class="card" style="margin-bottom: 2rem;">
        <h3 id="event-form-title">Add New Event Package</h3>
        <form id="addEventForm" onsubmit="saveEvent(event)">
            <input type="hidden" id="eventId">
            <div class="grid grid-2">
                <div class="form-group">
                    <label>Package Name *</label>
                    <input type="text" class="form-control" id="eventName" placeholder="e.g., Grand Wedding Package" required>
                </div>
                <div class="form-group">
                    <label>Total Price (₹) *</label>
                    <input type="number" class="form-control" id="eventPrice" required>
                </div>
            </div>
            <div class="grid grid-3">
                <div class="form-group">
                    <label>Event Type *</label>
                    <select class="form-control" id="eventType" required>
                        <option value="Wedding">Wedding</option>
                        <option value="Corporate">Corporate Event</option>
                        <option value="Birthday">Birthday</option>
                        <option value="Anniversary">Anniversary</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Capacity (Guests) *</label>
                    <input type="number" class="form-control" id="eventCapacity" min="1" required>
                </div>
                <div class="form-group">
                    <label>Duration</label>
                    <input type="text" class="form-control" id="eventDuration" placeholder="e.g., 4 hours">
                </div>
            </div>
            <div class="form-group">
                <label>Venue</label>
                <input type="text" class="form-control" id="eventVenue" placeholder="e.g., Banquet Hall, Outdoor Garden">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea class="form-control" id="eventDescription" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>Inclusions (comma separated)</label>
                <input type="text" class="form-control" id="eventInclusions" placeholder="e.g., Catering, Decoration, Photography, DJ">
            </div>
            <div class="form-group">
                <label><input type="checkbox" id="eventActive" checked> Active</label>
            </div>
            <button type="submit" class="btn btn-success" id="event-submit-btn">Add Package</button>
            <button type="button" class="btn btn-secondary" onclick="hideEventForm()">Cancel</button>
        </form>
    </div>
    
    <div id="events-list"></div>
    </div>
    
    <!-- Requests Tab -->
    <div id="requests-tab" class="tab-content" style="display: none;">
        <div style="margin-bottom: 2rem;">
            <h3>Event Service Requests</h3>
            <div class="filter-tabs" style="margin-top: 1rem;">
                <button class="filter-btn active" onclick="filterRequests('all')">All</button>
                <button class="filter-btn" onclick="filterRequests('pending')">Pending</button>
                <button class="filter-btn" onclick="filterRequests('confirmed')">Confirmed</button>
                <button class="filter-btn" onclick="filterRequests('cancelled')">Cancelled</button>
            </div>
        </div>
        
        <div id="requests-list"></div>
    </div>
</div>

<!-- Request Details Modal -->
<div id="request-modal" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 800px;">
        <span class="close" onclick="closeRequestModal()">&times;</span>
        <div id="request-details"></div>
    </div>
</div>

<style>
.btn-sm {
    padding: 0.4rem 0.8rem;
    font-size: 0.9rem;
}
.badge {
    padding: 0.25rem 0.5rem;
    border-radius: 4px;
    font-size: 0.85rem;
    font-weight: 600;
}
.badge-success {
    background: #4CAF50;
    color: white;
}
.badge-secondary {
    background: #999;
    color: white;
}
.badge-pending {
    background: #FFA500;
    color: white;
}
.badge-confirmed {
    background: #4CAF50;
    color: white;
}
.badge-cancelled, .badge-rejected {
    background: #f44336;
    color: white;
}
.tabs {
    display: flex;
    gap: 1rem;
    border-bottom: 2px solid #e0e0e0;
}
.tab-btn {
    padding: 0.75rem 1.5rem;
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 600;
    color: #666;
    transition: all 0.3s;
}
.tab-btn:hover {
    color: var(--primary);
}
.tab-btn.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
}
.filter-tabs {
    display: flex;
    gap: 0.5rem;
}
.filter-btn {
    padding: 0.5rem 1rem;
    background: #f5f5f5;
    border: 1px solid #ddd;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.3s;
}
.filter-btn:hover {
    background: #e0e0e0;
}
.filter-btn.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
}
.modal {
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    overflow: auto;
    background-color: rgba(0,0,0,0.5);
}
.modal-content {
    background-color: #fefefe;
    margin: 5% auto;
    padding: 2rem;
    border-radius: 8px;
    width: 90%;
    max-height: 85vh;
    overflow-y: auto;
}
.close {
    color: #aaa;
    float: right;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
}
.close:hover {
    color: #000;
}
.chat-container {
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 1rem;
    margin-top: 1rem;
    max-height: 400px;
    overflow-y: auto;
    background: #f9f9f9;
}
.message {
    margin-bottom: 1rem;
    padding: 0.75rem;
    border-radius: 8px;
}
.message-admin {
    background: #e3f2fd;
    text-align: right;
}
.message-customer {
    background: #fff3e0;
    text-align: left;
}
.message-sender {
    font-weight: bold;
    font-size: 0.85rem;
    color: #666;
    margin-bottom: 0.25rem;
}
.message-text {
    font-size: 0.95rem;
}
.message-time {
    font-size: 0.75rem;
    color: #999;
    margin-top: 0.25rem;
}
</style>

<script>
let currentFilter = 'all';
let currentRequestId = null;

document.addEventListener('DOMContentLoaded', () => {
    loadAdminEvents();
});

function switchTab(tab) {
    // Update tab buttons
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    
    // Show/hide tab content
    document.getElementById('packages-tab').style.display = tab === 'packages' ? 'block' : 'none';
    document.getElementById('requests-tab').style.display = tab === 'requests' ? 'block' : 'none';
    
    // Load requests if switching to requests tab
    if (tab === 'requests') {
        loadRequests();
    }
}

async function loadRequests(filter = 'all') {
    const token = localStorage.getItem('token');
    currentFilter = filter;
    
    try {
        let url = '/api/requests/all?serviceType=events';
        if (filter !== 'all') {
            url += `&status=${filter}`;
        }
        
        const response = await fetch(url, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        
        const container = document.getElementById('requests-list');
        
        if (data.success && data.requests.length > 0) {
            container.innerHTML = data.requests.map(req => `
                <div class="card" style="margin-bottom: 1rem;">
                    <div style="display: flex; justify-content: space-between; align-items: start; gap: 1rem;">
                        <div style="flex: 1;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                                <h3 style="margin: 0;">${req.requestNumber}</h3>
                                <span class="badge badge-${req.status}">${req.status.toUpperCase()}</span>
                            </div>
                            <p style="margin: 0.25rem 0;"><strong>Customer:</strong> ${req.userName} (${req.userPhone})</p>
                            <p style="margin: 0.25rem 0;"><strong>Event:</strong> ${req.requestData.eventType} | <strong>Capacity:</strong> ${req.requestData.capacity} people</p>
                            <p style="margin: 0.25rem 0;"><strong>Date:</strong> ${new Date(req.scheduledDate).toLocaleDateString('en-IN')} at ${req.scheduledTime}</p>
                            <p style="margin: 0.25rem 0;"><strong>Venue:</strong> ${req.requestData.venue || 'Not specified'}</p>
                            ${req.totalAmount ? `<p style="margin: 0.25rem 0;"><strong>Estimated Amount:</strong> ₹${req.totalAmount}</p>` : ''}
                            <p style="margin: 0.25rem 0; font-size: 0.85rem; color: #666;">Requested on ${new Date(req.createdAt).toLocaleString('en-IN')}</p>
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                            <button class="btn btn-primary btn-sm" onclick="viewRequestDetails(${req.id})">View Details & Chat</button>
                            ${req.status === 'pending' ? `
                                <button class="btn btn-success btn-sm" onclick="updateRequestStatus(${req.id}, 'confirmed')">Confirm</button>
                                <button class="btn btn-danger btn-sm" onclick="updateRequestStatus(${req.id}, 'rejected')">Reject</button>
                            ` : ''}
                            ${req.status === 'confirmed' ? `
                                <button class="btn btn-danger btn-sm" onclick="updateRequestStatus(${req.id}, 'cancelled')">Cancel</button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        } else {
            container.innerHTML = '<p style="text-align: center; color: #666; padding: 2rem;">No requests found.</p>';
        }
    } catch (error) {
        console.error('Error loading requests:', error);
        showAlert('Failed to load requests', 'error');
    }
}

function filterRequests(status) {
    // Update active filter button
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    
    loadRequests(status);
}

async function viewRequestDetails(requestId) {
    const token = localStorage.getItem('token');
    currentRequestId = requestId;
    
    try {
        const response = await fetch(`/api/requests/${requestId}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        
        if (data.success) {
            const req = data.request;
            document.getElementById('request-details').innerHTML = `
                <h2>Request ${req.requestNumber}</h2>
                <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                    <span class="badge badge-${req.status}" style="font-size: 1rem; padding: 0.5rem 1rem;">${req.status.toUpperCase()}</span>
                    <div>
                        ${req.status === 'pending' ? `
                            <button class="btn btn-success" onclick="updateRequestStatus(${req.id}, 'confirmed', true)">Confirm Request</button>
                            <button class="btn btn-danger" onclick="updateRequestStatus(${req.id}, 'rejected', true)">Reject Request</button>
                        ` : ''}
                        ${req.status === 'confirmed' ? `
                            <button class="btn btn-danger" onclick="updateRequestStatus(${req.id}, 'cancelled', true)">Cancel Request</button>
                        ` : ''}
                    </div>
                </div>
                
                <div style="background: #f5f5f5; padding: 1rem; border-radius: 8px; margin-bottom: 1rem;">
                    <h3>Customer Information</h3>
                    <p><strong>Name:</strong> ${req.userName}</p>
                    <p><strong>Email:</strong> ${req.userEmail}</p>
                    <p><strong>Phone:</strong> ${req.userPhone}</p>
                </div>
                
                <div style="background: #f5f5f5; padding: 1rem; border-radius: 8px; margin-bottom: 1rem;">
                    <h3>Event Details</h3>
                    <p><strong>Event Type:</strong> ${req.requestData.eventType}</p>
                    <p><strong>Expected Capacity:</strong> ${req.requestData.capacity} people</p>
                    <p><strong>Date:</strong> ${new Date(req.scheduledDate).toLocaleDateString('en-IN')}</p>
                    <p><strong>Time:</strong> ${req.scheduledTime}</p>
                    <p><strong>Venue:</strong> ${req.requestData.venue || 'Not specified'}</p>
                    ${req.totalAmount ? `<p><strong>Estimated Amount:</strong> ₹${req.totalAmount}</p>` : ''}
                </div>
                
                ${req.requestData.specialInstructions ? `
                    <div style="background: #f5f5f5; padding: 1rem; border-radius: 8px; margin-bottom: 1rem;">
                        <h3>Special Instructions</h3>
                        <p>${req.requestData.specialInstructions}</p>
                    </div>
                ` : ''}
                
                <div style="margin-top: 2rem;">
                    <h3>Communication</h3>
                    <div class="chat-container" id="chat-messages">
                        ${req.messages && req.messages.length > 0 ? req.messages.map(msg => `
                            <div class="message message-${msg.senderRole}">
                                <div class="message-sender">${msg.senderName} (${msg.senderRole})</div>
                                <div class="message-text">${msg.message}</div>
                                <div class="message-time">${new Date(msg.createdAt).toLocaleString('en-IN')}</div>
                            </div>
                        `).join('') : '<p style="text-align: center; color: #999;">No messages yet</p>'}
                    </div>
                    
                    <form onsubmit="sendMessage(event)" style="margin-top: 1rem;">
                        <div class="form-group">
                            <textarea class="form-control" id="message-input" rows="3" placeholder="Type your message to the customer..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Send Message</button>
                    </form>
                </div>
            `;
            
            document.getElementById('request-modal').style.display = 'block';
        }
    } catch (error) {
        console.error('Error loading request details:', error);
        showAlert('Failed to load request details', 'error');
    }
}

async function sendMessage(e) {
    e.preventDefault();
    const token = localStorage.getItem('token');
    const message = document.getElementById('message-input').value.trim();
    
    if (!message) return;
    
    try {
        const response = await fetch(`/api/requests/${currentRequestId}/messages`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ message })
        });
        
        const data = await response.json();
        
        if (data.success) {
            document.getElementById('message-input').value = '';
            viewRequestDetails(currentRequestId);
        } else {
            showAlert(data.message || 'Failed to send message', 'error');
        }
    } catch (error) {
        console.error('Error sending message:', error);
        showAlert('Failed to send message', 'error');
    }
}

async function updateRequestStatus(requestId, status, closeModal = false) {
    const confirmMessages = {
        'confirmed': 'Are you sure you want to confirm this event?',
        'rejected': 'Are you sure you want to reject this event?',
        'cancelled': 'Are you sure you want to cancel this event?'
    };
    
    if (!confirm(confirmMessages[status])) return;
    
    const token = localStorage.getItem('token');
    
    try {
        const response = await fetch(`/api/requests/${requestId}/status`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ status })
        });
        
        const data = await response.json();
        
        if (data.success) {
            showAlert(data.message, 'success');
            loadRequests(currentFilter);
            if (closeModal) {
                closeRequestModal();
            }
        } else {
            showAlert(data.message || 'Failed to update status', 'error');
        }
    } catch (error) {
        console.error('Error updating request status:', error);
        showAlert('Failed to update request status', 'error');
    }
}

function closeRequestModal() {
    document.getElementById('request-modal').style.display = 'none';
    currentRequestId = null;
}

// Close modal when clicking outside
window.onclick = function(event) {
    const modal = document.getElementById('request-modal');
    if (event.target == modal) {
        closeRequestModal();
    }
}

// Original event package functions below...

async function loadAdminEvents() {
    const token = localStorage.getItem('token');
    try {
        const response = await fetch('/api/events/packages/all', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        const container = document.getElementById('events-list');
        if (data.success && data.packages.length > 0) {
            container.innerHTML = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>Package Name</th>
                            <th>Event Type</th>
                            <th>Capacity</th>
                            <th>Price</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.packages.map(pkg => `
                            <tr>
                                <td><strong>${pkg.name}</strong></td>
                                <td>${pkg.eventType}</td>
                                <td>${pkg.capacity} guests</td>
                                <td>₹${pkg.price}</td>
                                <td><span class="badge badge-${pkg.isActive ? 'success' : 'secondary'}">${pkg.isActive ? 'Active' : 'Inactive'}</span></td>
                                <td>
                                    <button class="btn btn-primary btn-sm" onclick='editEvent(${JSON.stringify(pkg).replace(/'/g, "&#39;")})'>Edit</button>
                                    <button class="btn btn-danger btn-sm" onclick="deleteEvent(${pkg.id})">Delete</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        } else {
            container.innerHTML = '<p>No event packages yet. Add your first package!</p>';
        }
    } catch (error) {
        showAlert('Failed to load event packages', 'error');
    }
}

function showAddEventForm() {
    document.getElementById('event-form').style.display = 'block';
    document.getElementById('event-form-title').textContent = 'Add New Event Package';
    document.getElementById('event-submit-btn').textContent = 'Add Package';
    document.getElementById('addEventForm').reset();
    document.getElementById('eventId').value = '';
    document.getElementById('eventActive').checked = true;
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function hideEventForm() {
    document.getElementById('event-form').style.display = 'none';
    document.getElementById('addEventForm').reset();
}

function editEvent(pkg) {
    document.getElementById('event-form').style.display = 'block';
    document.getElementById('event-form-title').textContent = 'Edit Event Package';
    document.getElementById('event-submit-btn').textContent = 'Update Package';
    document.getElementById('eventId').value = pkg.id;
    document.getElementById('eventName').value = pkg.name;
    document.getElementById('eventPrice').value = pkg.price;
    document.getElementById('eventType').value = pkg.eventType;
    document.getElementById('eventCapacity').value = pkg.capacity;
    document.getElementById('eventDuration').value = pkg.duration || '';
    document.getElementById('eventVenue').value = pkg.venue || '';
    document.getElementById('eventDescription').value = pkg.description || '';
    document.getElementById('eventInclusions').value = (pkg.inclusions || []).join(', ');
    document.getElementById('eventActive').checked = pkg.isActive === 1;
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function saveEvent(e) {
    e.preventDefault();
    const token = localStorage.getItem('token');
    const eventId = document.getElementById('eventId').value;
    const isEditing = eventId !== '';
    const inclusions = document.getElementById('eventInclusions').value.split(',').map(f => f.trim()).filter(f => f);
    const packageData = {
        name: document.getElementById('eventName').value,
        description: document.getElementById('eventDescription').value,
        eventType: document.getElementById('eventType').value,
        capacity: parseInt(document.getElementById('eventCapacity').value),
        price: parseFloat(document.getElementById('eventPrice').value),
        duration: document.getElementById('eventDuration').value,
        venue: document.getElementById('eventVenue').value,
        inclusions: inclusions,
        isActive: document.getElementById('eventActive').checked ? 1 : 0
    };
    try {
        const url = isEditing ? `/api/events/packages/${eventId}` : '/api/events/packages';
        const response = await fetch(url, {
            method: isEditing ? 'PUT' : 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(packageData)
        });
        const data = await response.json();
        if (data.success) {
            showAlert(isEditing ? 'Package updated!' : 'Package created!', 'success');
            hideEventForm();
            loadAdminEvents();
        } else {
            showAlert(data.message, 'error');
        }
    } catch (error) {
        showAlert('Failed to save event package', 'error');
    }
}

async function deleteEvent(id) {
    if (!confirm('Are you sure you want to delete this event package?')) return;
    const token = localStorage.getItem('token');
    try {
        const response = await fetch(`/api/events/packages/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        if (data.success) {
            showAlert('Event package deleted!', 'success');
            loadAdminEvents();
        } else {
            showAlert(data.message, 'error');
        }
    } catch (error) {
        showAlert('Failed to delete event package', 'error');
    }
}
</script>
{% endblock %}
