{% extends 'base.html' %}
{% block title %}Manage Coupons - Admin{% endblock %}
{% block content %}
<div class="container">
    <div class="section-heading">
        <h2>Manage Discount Coupons</h2>
        <p>Add, edit, and manage discount codes</p>
    </div>
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h3>Active Coupons</h3>
        <button class="btn btn-primary" onclick="showAddCouponForm()">+ Add New Coupon</button>
    </div>
    
    <div id="coupon-form" style="display: none;" class="card" style="margin-bottom: 2rem;">
        <h3>Add New Coupon</h3>
        <form id="addCouponForm" onsubmit="saveCoupon(event)">
            <div class="grid grid-2">
                <div class="form-group">
                    <label>Coupon Code *</label>
                    <input type="text" class="form-control" id="couponCode" placeholder="WELCOME50" style="text-transform: uppercase;" required>
                </div>
                <div class="form-group">
                    <label>Expiry Date *</label>
                    <input type="date" class="form-control" id="couponExpiry" required>
                </div>
            </div>
            <div class="grid grid-3">
                <div class="form-group">
                    <label>Discount Type *</label>
                    <select class="form-control" id="couponType" onchange="toggleMaxDiscount()" required>
                        <option value="flat">Flat Discount (₹)</option>
                        <option value="percentage">Percentage (%)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Value *</label>
                    <input type="number" class="form-control" id="couponValue" placeholder="50" required>
                </div>
                <div class="form-group" id="maxDiscountGroup" style="display: none;">
                    <label>Max Discount (₹)</label>
                    <input type="number" class="form-control" id="couponMaxDiscount" placeholder="200">
                </div>
            </div>
            <div class="grid grid-2">
                <div class="form-group">
                    <label>Minimum Order Value (₹)</label>
                    <input type="number" class="form-control" id="couponMinOrder" placeholder="0" value="0">
                </div>
                <div class="form-group">
                    <label>Usage Limit</label>
                    <input type="number" class="form-control" id="couponLimit" value="100">
                </div>
            </div>
            <div class="form-group">
                <label>Category (Optional)</label>
                <input type="text" class="form-control" id="couponCategory" placeholder="e.g., First Order, Festival">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea class="form-control" id="couponDescription" placeholder="Get flat ₹50 off on orders above ₹500"></textarea>
            </div>
            <button type="submit" class="btn btn-success">Create Coupon</button>
            <button type="button" class="btn btn-secondary" onclick="hideCouponForm()">Cancel</button>
        </form>
    </div>
    
    <div id="coupons-list"></div>
</div>

<style>
.btn-sm {
    padding: 0.4rem 0.8rem;
    font-size: 0.9rem;
}
.badge {
    padding: 0.25rem 0.5rem;
    border-radius: 4px;
    font-size: 0.85rem;
    font-weight: 600;
}
.badge-success {
    background: #4CAF50;
    color: white;
}
.badge-warning {
    background: #FF9800;
    color: white;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', () => {
    loadAdminCoupons();
    // Set default expiry to 30 days from now
    const date = new Date();
    date.setDate(date.getDate() + 30);
    document.getElementById('couponExpiry').value = date.toISOString().split('T')[0];
});

async function loadAdminCoupons() {
    try {
        const response = await fetch('/api/coupons/');
        const data = await response.json();
        const container = document.getElementById('coupons-list');
        if (data.success && data.coupons.length > 0) {
            container.innerHTML = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Type</th>
                            <th>Discount</th>
                            <th>Min Order</th>
                            <th>Expiry</th>
                            <th>Usage</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.coupons.map(c => `
                            <tr>
                                <td><strong>${c.code}</strong></td>
                                <td>${c.type === 'flat' ? 'Flat' : 'Percentage'}</td>
                                <td>${c.type === 'flat' ? '₹' + c.value : c.value + '%'}${c.maxDiscount ? ' (Max ₹' + c.maxDiscount + ')' : ''}</td>
                                <td>₹${c.minOrderValue}</td>
                                <td>${new Date(c.expiryDate).toLocaleDateString()}</td>
                                <td>${c.usedCount}/${c.usageLimit}</td>
                                <td>
                                    <button class="btn btn-danger btn-sm" onclick="deleteCoupon(${c.id})">Delete</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        } else {
            container.innerHTML = '<p>No coupons yet. Add your first coupon!</p>';
        }
    } catch (error) {
        showAlert('Failed to load coupons', 'error');
    }
}

function showAddCouponForm() {
    document.getElementById('coupon-form').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function hideCouponForm() {
    document.getElementById('coupon-form').style.display = 'none';
    document.getElementById('addCouponForm').reset();
}

function toggleMaxDiscount() {
    const type = document.getElementById('couponType').value;
    const maxDiscountGroup = document.getElementById('maxDiscountGroup');
    maxDiscountGroup.style.display = type === 'percentage' ? 'block' : 'none';
}

async function saveCoupon(e) {
    e.preventDefault();
    const token = localStorage.getItem('token');
    const couponData = {
        code: document.getElementById('couponCode').value.toUpperCase(),
        type: document.getElementById('couponType').value,
        value: parseFloat(document.getElementById('couponValue').value),
        maxDiscount: document.getElementById('couponMaxDiscount').value ? parseFloat(document.getElementById('couponMaxDiscount').value) : null,
        minOrderValue: parseFloat(document.getElementById('couponMinOrder').value || 0),
        category: document.getElementById('couponCategory').value,
        description: document.getElementById('couponDescription').value,
        expiryDate: document.getElementById('couponExpiry').value,
        usageLimit: parseInt(document.getElementById('couponLimit').value)
    };
    try {
        const response = await fetch('/api/coupons/create', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(couponData)
        });
        const data = await response.json();
        if (data.success) {
            showAlert('Coupon created successfully!', 'success');
            hideCouponForm();
            loadAdminCoupons();
        } else {
            showAlert(data.message, 'error');
        }
    } catch (error) {
        showAlert('Failed to create coupon', 'error');
    }
}

async function deleteCoupon(id) {
    if (!confirm('Are you sure you want to delete this coupon?')) return;
    const token = localStorage.getItem('token');
    try {
        const response = await fetch(`/api/coupons/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        if (data.success) {
            showAlert('Coupon deleted successfully!', 'success');
            loadAdminCoupons();
        } else {
            showAlert(data.message, 'error');
        }
    } catch (error) {
        showAlert('Failed to delete coupon', 'error');
    }
}
</script>
{% endblock %}
