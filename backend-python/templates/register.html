{% extends 'base.html' %}
{% block title %}Register - SWAAD SADAN{% endblock %}
{% block content %}
<div class="container">
    <div style="max-width: 500px; margin: 3rem auto;">
        <div class="card">
            <h2 style="text-align: center; color: var(--primary); margin-bottom: 2rem;">Create Account</h2>
            
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" class="form-control" id="name" required>
                </div>
                
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-control" id="email" required>
                </div>
                
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" class="form-control" id="phone" pattern="[0-9]{10}" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" id="password" minlength="6" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
            </form>
            
            <p style="text-align: center; margin-top: 1.5rem;">
                Already have an account? <a href="/login" style="color: var(--primary);">Login here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function handleRegister(e) {
    e.preventDefault();
    
    const userData = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        password: document.getElementById('password').value
    };
    
    try {
        const response = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(userData)
        });
        
        const data = await response.json();
        
        if (data.success) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            showAlert('Registration successful!', 'success');
            setTimeout(() => window.location.href = '/menu', 1000);
        } else {
            showAlert(data.message, 'error');
        }
    } catch (error) {
        showAlert('Registration failed', 'error');
    }
}
</script>
{% endblock %}
