{% extends 'base.html' %}

{% block head %}
{{ super() }}
<!-- Prevent caching to ensure latest code loads -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
{% endblock %}

{% block title %}Menu - SWAAD SADAN{% endblock %}
{% block content %}
<div class="container">
    <div class="section-heading">
        <h2>Our Menu</h2>
        <p>Explore our delicious pure vegetarian dishes</p>
    </div>
    
    <!-- Filters -->
    <div style="display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap;">
        <button class="btn btn-primary" onclick="loadProducts()">All</button>
        <button class="btn btn-secondary" onclick="loadProducts({isVeg: true})">Veg Only</button>
        <button class="btn btn-secondary" onclick="loadProducts({isHealthBox: true})">Health Box</button>
    </div>
    
    <div id="products-container" class="grid grid-3"></div>
</div>

{% endblock %}

{% block scripts %}
<script>
    // Version check for debugging cache issues
    console.log('🔄 Menu.html version: HTTPS-FIX-v2 (May 18, 2026)');
    console.log('🌐 Current protocol:', window.location.protocol);
    console.log('🔗 Origin:', window.location.origin);
    
    // Store products globally
    let menuProducts = [];
    
    async function loadProducts(filters = {}) {
        const container = document.getElementById('products-container');
        
        try {
            // Show loading message
            container.innerHTML = '<p style="text-align: center; padding: 3rem;">Loading menu...</p>';
            
            // Build URL ensuring it uses current protocol (HTTPS on Render)
            const params = new URLSearchParams(filters);
            const url = `${window.location.origin}/api/products?${params}`;
            const response = await fetch(url);
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            
            const data = await response.json();
            console.log('Products loaded:', data);
            
            // Check if we have products
            if (!data.products || data.products.length === 0) {
                container.innerHTML = '<p style="text-align: center; padding: 3rem;">No products available. Please check back later!</p>';
                return;
            }
            
            // Store products globally
            menuProducts = data.products;
            
            // Render products
            const html = menuProducts.map(product => {
                const isAvailable = product.isAvailable === 1 || product.isAvailable === true;
                const isVeg = product.isVeg === 1 || product.isVeg === true;
                const isHealthBox = product.isHealthBox === 1 || product.isHealthBox === true;
                
                return `
                    <div class="product-card" style="${!isAvailable ? 'opacity: 0.6;' : ''}">
                        <div class="product-img" style="background: linear-gradient(135deg, #FFE0B2, #FFAB91); display: flex; align-items: center; justify-content: center; font-size: 4rem;">
                            ${isVeg ? '🥗' : '🍱'}
                        </div>
                        <div class="product-info">
                            <h3 class="product-name">${product.name}</h3>
                            <p class="product-price">₹${product.price}</p>
                            <div style="margin: 0.5rem 0;">
                                ${!isAvailable ? '<span class="product-badge" style="background: #DC3545; color: white;">❌ Out of Stock</span>' : ''}
                                ${isVeg ? '<span class="product-badge badge-veg">🌿 Pure Veg</span>' : ''}
                                ${isHealthBox ? '<span class="product-badge badge-health">💪 Health Box</span>' : ''}
                            </div>
                            <p style="color: #666; font-size: 0.9rem;">${product.description || 'Delicious homemade food'}</p>
                            ${isAvailable 
                                ? `<button class="btn btn-primary" style="margin-top: 1rem; width: 100%;" onclick="addProductToCart(${product.id})">Add to Cart</button>`
                                : '<button class="btn btn-secondary" style="margin-top: 1rem; width: 100%;" disabled>Out of Stock</button>'
                            }
                        </div>
                    </div>
                `;
            }).join('');
            
            container.innerHTML = html;
            
        } catch (error) {
            console.error('Error loading products:', error);
            container.innerHTML = `
                <div style="text-align: center; padding: 3rem;">
                    <p style="color: red; margin-bottom: 1rem;">❌ Error loading menu</p>
                    <p style="color: #666; margin-bottom: 1rem;">Details: ${error.message}</p>
                    <button class="btn btn-primary" onclick="loadProducts()">Try Again</button>
                </div>
            `;
        }
    }
    
    function addProductToCart(productId) {
        const product = menuProducts.find(p => p.id === productId);
        if (product && typeof addToCart === 'function') {
            addToCart(product);
        } else {
            alert('Please wait for the page to fully load');
        }
    }
    
    // Load products when page is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadProducts);
    } else {
        loadProducts();
    }
</script>
{% endblock %}
