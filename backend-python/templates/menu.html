{% extends 'base.html' %}

{% block head %}
{{ super() }}
<!-- Prevent caching to ensure latest code loads -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
{% endblock %}

{% block title %}Menu - SWAAD SADAN{% endblock %}
{% block content %}
<div class="container">
    <div class="section-heading">
        <h2>Our Menu</h2>
        <p>Explore our delicious pure vegetarian dishes</p>
    </div>
    
    <!-- Filters -->
    <div style="display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap;">
        <button class="btn btn-primary" onclick="loadProducts()">All</button>
        <button class="btn btn-secondary" onclick="loadProducts({isVeg: true})">Veg Only</button>
        <button class="btn btn-secondary" onclick="loadProducts({isHealthBox: true})">Health Box</button>
    </div>
    
    <div id="products-container" class="grid grid-3"></div>
</div>

{% endblock %}

{% block scripts %}
<script>
// Simple, clean code - exactly like admin page
console.log('Menu page loaded');

let menuProducts = [];

async function loadProducts(filters) {
    // Prevent event objects from being passed
    if (filters && typeof filters.preventDefault === 'function') {
        filters = {};
    }
    if (!filters) filters = {};
    
    const container = document.getElementById('products-container');
    container.innerHTML = '<p style="text-align: center; padding: 2rem;">Loading...</p>';
    
    try {
        // Simple relative URL - route now has strict_slashes=False
        const params = new URLSearchParams(filters);
        const url = '/api/products?' + params.toString();
        console.log('=== FETCH ATTEMPT ===');
        console.log('URL:', url);
        console.log('Filters:', filters);
        
        const response = await fetch(url, {
            method: 'GET',
            headers: {
                'Accept': 'application/json'
            }
        });
        console.log('=== RESPONSE RECEIVED ===');
        console.log('Status:', response.status);
        console.log('OK:', response.ok);
        
        if (!response.ok) {
            throw new Error('Server returned ' + response.status);
        }
        
        const data = await response.json();
        console.log('Data received:', data);
        
        if (!data.products || data.products.length === 0) {
            container.innerHTML = '<p style="text-align: center; padding: 2rem;">No products found</p>';
            return;
        }
        
        menuProducts = data.products;
        
        // Render products
        container.innerHTML = menuProducts.map(product => `
            <div class="product-card">
                <div class="product-img" style="background: linear-gradient(135deg, #FFE0B2, #FFAB91); display: flex; align-items: center; justify-content: center; font-size: 3rem;">
                    ${product.isVeg ? '🥗' : '🍱'}
                </div>
                <div class="product-info">
                    <h3 class="product-name">${product.name}</h3>
                    <p class="product-price">₹${product.price}</p>
                    ${product.description ? `<p style="color: #666; font-size: 0.9rem;">${product.description}</p>` : ''}
                    <button class="btn btn-primary" style="margin-top: 1rem; width: 100%;" onclick="addToCart(${product.id})">
                        Add to Cart
                    </button>
                </div>
            </div>
        `).join('');
        
    } catch (error) {
        console.error('=== ERROR CAUGHT ===');
        console.error('Error type:', error.constructor.name);
        console.error('Error message:', error.message);
        console.error('Error stack:', error.stack);
        console.error('Full error object:', error);
        container.innerHTML = `
            <div style="text-align: center; padding: 2rem; max-width: 600px; margin: 0 auto;">
                <p style="color: red; font-size: 1.1rem; margin-bottom: 1rem;">Error: ${error.message}</p>
                <p style="color: #666; font-size: 0.9rem; margin-bottom: 0.5rem;">Type: ${error.constructor.name}</p>
                <p style="color: #999; font-size: 0.85rem; word-break: break-all; margin-bottom: 1rem;">
                    Check F12 Console for detailed logs
                </p>
                <button class="btn btn-primary" onclick="loadProducts()">Retry</button>
            </div>
        `;
    }
}

function addToCart(productId) {
    const product = menuProducts.find(p => p.id === productId);
    if (product) {
        alert('Added ' + product.name + ' to cart (₹' + product.price + ')');
        console.log('Added to cart:', product);
    }
}

// Auto-load on page ready
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => loadProducts());
} else {
    loadProducts();
}
</script>
{% endblock %}
